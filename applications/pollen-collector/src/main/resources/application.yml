spring:
  application.name: pollen-collector
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pollen}
    username: ${DB_USER:pollen}
    password: ${DB_PASSWORD:pollen}
  jpa:
    # La tabla la crea Flyway desde pollen-core; el collector solo la utiliza.
    hibernate.ddl-auto: none
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pollen}
    password: ${RABBITMQ_PASSWORD:pollen}
server.port: ${SERVER_PORT:8081}
management.endpoints.web.exposure.include: health,info
storage.s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${S3_BUCKET:pollen-imports}
