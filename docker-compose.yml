name: polen-tracker
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pollen}
      POSTGRES_USER: ${POSTGRES_USER:-pollen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pollen}
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 5s, timeout: 3s, retries: 20}
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-pollen}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-pollen}
    ports: ["5672:5672", "15672:15672"]
    volumes: [rabbitmq-data:/var/lib/rabbitmq]
    healthcheck: {test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"], interval: 5s, timeout: 5s, retries: 20}
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c", "until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done; mc mb --ignore-existing local/$${S3_BUCKET}"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pollen-imports}
  pollen-core:
    build: {context: ., dockerfile: applications/pollen-core/Dockerfile}
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pollen}
      DB_USER: ${POSTGRES_USER:-pollen}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pollen}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-pollen}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-pollen}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["8080:8080"]
    depends_on:
      postgres: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
  pollen-collector:
    build: {context: ., dockerfile: applications/pollen-collector/Dockerfile}
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-pollen}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-pollen}
      S3_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["8081:8081"]
    depends_on:
      rabbitmq: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
volumes: {postgres-data: {}, rabbitmq-data: {}, minio-data: {}}
